<html lang="en">

    <title>Document</title>
    <style>
      .yellow {
        background-color: yellow;
      }

      .orange {
        background-color: orangered;
      }
    </style>
  </head>
  <body>
    <div id="com"></div>
    <script>
      // let ul = document.createElement("ul");

      // document.body.append(ul);

      // this is another example using vanilla js how the virtual DOM works without react

      let arr = ["banana", "apple", "mango"];
      x = 0;
      setInterval(() => {
        arr[0] = x % 2 == 0 ? "banana" : "orange";
        let className = arr[0] == "banana" ? "yellow" : "orange";
        document.getElementById("com").innerHTML = `
                    <ul>
                      <li class=${className}>${arr[0]}</li>
                      <li id="second">Mango</li>
                      <li id="third">Apple</li>
                    </ul>
        `;
        x++;
      }, 3000);
    </script>
  </body>
