<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Apple Style Landing</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <h1> Store</h1>
      <nav>
        <a href="#iphone">iPhone</a>
        <a href="#mac">Mac</a>
        <a href="#watch">Watch</a>
      </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
      <h2>iPhone 15 Pro</h2>
      <p>So powerful. So light. So Pro.</p>
      <button onclick="buyNow()">Buy Now</button>
    </section>

    <!-- PRODUCTS -->
    <section id="iphone" class="product">
      <img src="images/Iphone2.jpg" />
      <div>
        <h2>iPhone</h2>
        <p>Advanced camera. A17 chip. Titanium design.</p>
      </div>
    </section>

    <section id="mac" class="product dark">
      <img src="images/mac.jpg" />
      <div>
        <h2>MacBook</h2>
        <p>Supercharged for pros.</p>
      </div>
    </section>

    <section id="watch" class="product">
      <img src="images/watch.jpg" />
      <div>
        <h2>Apple Watch</h2>
        <p>Your health companion.</p>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <p>Simple Apple Clone Project © 2026</p>
    </footer>

    <script>
      function buyNow() {
        alert("Thanks for your interest!");
      }
    </script>
  </body>
</html>
