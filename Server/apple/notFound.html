<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>404 - Page Not Found</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        text-align: center;
        color: #1d1d1f;
      }

      .container {
        max-width: 500px;
      }

      h1 {
        font-size: 80px;
        margin: 0;
      }

      h2 {
        margin: 10px 0;
        font-weight: 500;
      }

      p {
        color: #6e6e73;
        margin-bottom: 30px;
      }

      a {
        text-decoration: none;
        color: white;
        background: black;
        padding: 12px 24px;
        border-radius: 20px;
        transition: 0.3s;
      }

      a:hover {
        background: #333;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>Sorry, the page you are looking for doesn’t exist.</p>
      <a href="/">Go Home</a>
    </div>
  </body>
</html>
